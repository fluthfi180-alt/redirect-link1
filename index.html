  <title>Redirect Link 1</title>  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;

    }

    body{
      background:#0b1120;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
    }

    .box{
      width:90%;
      max-width:350px;
      background:#111827;
      padding:30px 20px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,140,255,.25);
    }

    h1{
      font-size:24px;
      margin-bottom:10px;
    }

    p{
      color:#bfc9d9;
      font-size:14px;
      margin-bottom:20px;
    }

    .btn{
      display:block;
      width:100%;
      padding:14px;
      border-radius:12px;
      background:linear-gradient(90deg,#0077ff,#00aaff);
      color:white;
      text-decoration:none;
      font-weight:bold;
      transition:.3s;
    }

    .btn:hover{
      opacity:.9;
      transform:scale(1.02);
    }
  </style></head>
